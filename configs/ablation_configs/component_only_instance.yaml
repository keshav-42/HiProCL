# Ablation: Only L_instance (SimCLR baseline)

# Data Configuration
data_path: "./LC25000"
image_size: 224
color_jitter_strength: 1.0

# Model Configuration
backbone_dim: 768
projection_hidden_dim: 2048
projection_dim: 128
pretrained_path: "./ctranspath.pth"

# Loss Type
loss_type: "ablation"

# Component Toggles
use_instance: true
use_subtype: false
use_organ: false
use_prototypical: false

# Loss Weights
alpha: 1.0
beta: 0.5
gamma: 0.3
lambda: 0.2

# Temperature
temperature: 0.5

# Prototype Configuration
num_subtypes: 5
num_organs: 2
prototype_momentum: 0.99

# Training Configuration
batch_size: 64
epochs: 40
learning_rate: 0.0005
weight_decay: 0.0001
min_lr: 0.000001

# Warmup
warmup_epochs: 5
warmup_lr: 0.0001

# Gradient Clipping
max_grad_norm: 1.0

# Data Loading
num_workers: 4
pin_memory: true

# Checkpointing
save_every: 10

# Reproducibility
seed: 42

# Debugging
log_loss_components: true
log_positive_pairs: false
